services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: epiwalk-dashboard:latest
    container_name: epiwalk-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ../python-counting:/python-counting
      - /var/run/docker.sock:/var/run/docker.sock
      - dashboard-data:/app/data
volumes:
  dashboard-data:
